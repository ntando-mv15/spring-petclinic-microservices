apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: petclinic-ingress
  namespace: petclinic

spec:
  ingressClassName: nginx

  rules:

  # Main Application
  - host: app.wildsurf.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80

  # Grafana
  - host: grafana.wildsurf.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-server
            port:
              number: 3000

  # Prometheus
  - host: prom.wildsurf.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus-server
            port:
              number: 9090
