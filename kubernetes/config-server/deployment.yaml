apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
      - name: config-server
        image: springcommunity/spring-petclinic-config-server
        ports:
        - containerPort: 8888

        resources:
          limits:
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 30

        livenessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 60
