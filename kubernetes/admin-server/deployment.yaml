apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-server
  namespace: petclinic

spec:
  replicas: 1

  selector:
    matchLabels:
      app: admin-server

  template:
    metadata:
      labels:
        app: admin-server

    spec:
      containers:
      - name: admin-server
        image: springcommunity/spring-petclinic-admin-server

        ports:
        - containerPort: 9090

        env:
        - name: CONFIG_SERVER_URL
          value: http://config-server:8888

        - name: EUREKA_SERVER_URL
          value: http://discovery-server:8761/eureka

        resources:
          limits:
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 9090
          initialDelaySeconds: 40
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 9090
          initialDelaySeconds: 70
          periodSeconds: 20
