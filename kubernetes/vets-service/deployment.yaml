apiVersion: apps/v1
kind: Deployment
metadata:
  name: vets-service
  namespace: petclinic

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vets-service

  template:
    metadata:
      labels:
        app: vets-service

    spec:
      containers:
      - name: vets-service
        image: springcommunity/spring-petclinic-vets-service

        ports:
        - containerPort: 8083

        env:
        - name: CONFIG_SERVER_URL
          value: http://config-server:8888

        - name: EUREKA_SERVER_URL
          value: http://discovery-server:8761/eureka

        resources:
          limits:
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 40
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 70
          periodSeconds: 20
